# =============================================================================
# Auto Code - Production Docker Compose Overrides
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend API (FastAPI) - Production
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend/Dockerfile.prod
    volumes: []  # No volume mounts in production
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URL=${QDRANT_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=production
      - LOG_LEVEL=warning
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: /autocode/backend
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-stream-prefix: backend
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --access-logfile -
      --error-logfile -

  # ---------------------------------------------------------------------------
  # Frontend (Next.js) - Production
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/frontend/Dockerfile.prod
    volumes: []
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: /autocode/frontend
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-stream-prefix: frontend

  # ---------------------------------------------------------------------------
  # PostgreSQL - Production
  # ---------------------------------------------------------------------------
  postgres:
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autocode} -d ${POSTGRES_DB:-autocode}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: /autocode/postgres
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-stream-prefix: postgres
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c max_connections=100
      -c log_min_duration_statement=1000

  # ---------------------------------------------------------------------------
  # Qdrant - Production
  # ---------------------------------------------------------------------------
  qdrant:
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: /autocode/qdrant
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-stream-prefix: qdrant

  # ---------------------------------------------------------------------------
  # Nginx - Production
  # ---------------------------------------------------------------------------
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: /autocode/nginx
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-stream-prefix: nginx
