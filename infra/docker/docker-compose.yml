# =============================================================================
# Auto Code - Development Docker Compose
# =============================================================================
# Usage: docker compose -f infra/docker/docker-compose.yml up --build
# Or:    make dev (from project root)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend API (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend/Dockerfile
    volumes:
      - ../../backend:/app/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://autocode:dev@postgres:5432/autocode
      - QDRANT_URL=http://qdrant:6333
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --reload
      --host 0.0.0.0
      --port 8000
      --log-level debug
    networks:
      - autocode-network

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/frontend/Dockerfile
    volumes:
      - ../../frontend:/app/frontend
      - /app/frontend/node_modules
      - /app/frontend/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - autocode-network

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=autocode
      - POSTGRES_USER=autocode
      - POSTGRES_PASSWORD=dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocode -d autocode"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - autocode-network

  # ---------------------------------------------------------------------------
  # Qdrant (Vector Database)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.0
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant/config.yaml:/qdrant/config/production.yaml:ro
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - autocode-network

  # ---------------------------------------------------------------------------
  # Nginx (Reverse Proxy)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - autocode-network

volumes:
  pgdata:
    driver: local
  qdrant_data:
    driver: local

networks:
  autocode-network:
    driver: bridge
