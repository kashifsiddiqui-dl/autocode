# =============================================================================
# Auto Code - Qdrant Configuration
# =============================================================================
# Tuned for ~130K vectors (ICD-10-CM medical codes)
# =============================================================================

# Storage configuration
storage:
  # Where Qdrant stores data on disk
  storage_path: /qdrant/storage

  # Write-ahead log for crash recovery
  wal:
    wal_capacity_mb: 256
    wal_segments_ahead: 0

  # Optimizer settings for ~130K vectors
  optimizers:
    # Merge segments when there are more than this many
    default_segment_number: 2

    # Maximum segment size before splitting (128MB)
    max_segment_size_kb: 131072

    # How many vectors to index before switching from plain to HNSW
    memmap_threshold_kb: 50000

    # Indexing threshold: build HNSW index when segment exceeds this
    indexing_threshold_kb: 20000

    # Flush interval in seconds
    flush_interval_sec: 5

    # Maximum number of optimization threads
    max_optimization_threads: 2

  # Performance tuning
  performance:
    # Number of parallel update threads
    max_search_threads: 0  # 0 = auto (number of CPU cores)

    # Optimize for 130K vectors - keep in memory for fast access
    # With ~130K vectors at 1536 dimensions (OpenAI), ~800MB RAM
    # With ~130K vectors at 384 dimensions (smaller model), ~200MB RAM
    optimizers_prefer_wall_clock: true

# Service configuration
service:
  # REST API
  host: "0.0.0.0"
  http_port: 6333

  # gRPC API (for high-performance clients)
  grpc_port: 6334
  enable_tls: false

  # Maximum request size (10MB)
  max_request_size_mb: 10

  # Enable CORS for development
  enable_cors: true

# Logging
log_level: INFO

# Telemetry (disable for privacy)
telemetry_disabled: true

# Collection-level defaults (applied when creating collections)
# These can be overridden per-collection via the API
#
# Recommended collection setup for ICD-10-CM codes:
#
#   PUT /collections/icd10cm_codes
#   {
#     "vectors": {
#       "size": 1536,        # OpenAI text-embedding-3-small dimension
#       "distance": "Cosine"
#     },
#     "optimizers_config": {
#       "indexing_threshold": 20000
#     },
#     "hnsw_config": {
#       "m": 16,              # Number of edges per node (good for 130K)
#       "ef_construct": 128,  # Construction quality (higher = better recall)
#       "full_scan_threshold": 10000
#     }
#   }
