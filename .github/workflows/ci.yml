# =============================================================================
# Auto Code - Continuous Integration
# =============================================================================
# Runs on every pull request to validate code quality, tests, and security.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------------------------
  # Backend Lint
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: pip-lint-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev]" 2>/dev/null || pip install -e . || true

      - name: Ruff check (linting)
        run: ruff check .

      - name: Ruff format (formatting)
        run: ruff format --check .

      - name: Mypy (type checking)
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true  # Advisory until full type coverage

  # ---------------------------------------------------------------------------
  # Backend Test
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: autocode_test
          POSTGRES_USER: autocode
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autocode -d autocode_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://autocode:test@localhost:5432/autocode_test
      QDRANT_URL: http://localhost:6333
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: pip-test-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . || true

      - name: Run migrations
        run: alembic upgrade head
        continue-on-error: true  # Migrations may not exist yet

      - name: Run tests with coverage
        run: |
          pytest -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ---------------------------------------------------------------------------
  # Frontend Lint
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check .

  # ---------------------------------------------------------------------------
  # Frontend Build (type checking via Next.js build)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (includes TypeScript type checking)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ---------------------------------------------------------------------------
  # Frontend Test
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --reporter=verbose

      - name: Run tests with coverage
        run: npm run test -- --coverage
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Security Scan
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # Trivy filesystem scan for vulnerabilities
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      # Python dependency audit
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit
        run: |
          pip install pip-audit
          cd backend
          pip install -e ".[dev]" 2>/dev/null || pip install -e . || true
          pip-audit --strict --desc
        continue-on-error: true  # Advisory until all deps are auditable

      # Node.js dependency audit
      - name: npm audit
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high
        continue-on-error: true  # Advisory — some deps may have known issues
